name: "CodeQL"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
  schedule:
    - cron: '19 1 * * 3'

permissions:
  contents: read

jobs:
  analyze_java:
    name: Analyze Java
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8dca8a82e2fa1a2c8908956f711300f9c4a4f4f6 # v2
        with:
          languages: java

      - name: Checkout submodules
        run: git submodule update --init --recursive
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;29.0.13113456"

      - name: Set up JDK 17
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Gradle :core:assemble
        run: ./gradlew :core:assemble -x validateSigningProductionRelease

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8dca8a82e2fa1a2c8908956f711300f9c4a4f4f6 # v2
        with:
          category: "/language:Java"
