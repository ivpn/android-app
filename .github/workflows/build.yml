name: Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@56b90f209b02bf6d1deae490e9ef18b21a389cd4 # v1

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Set up NDK
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779 # v1
        with:
          ndk-version: r25b

      - name: Install liboqs dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            astyle cmake gcc ninja-build libssl-dev \
            python3-pytest python3-pytest-xdist unzip \
            xsltproc doxygen graphviz python3-yaml valgrind

      - name: Set up JDK 17
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Gradle :core:assemble
        run: ./gradlew :core:assemble -x validateSigningProductionRelease
